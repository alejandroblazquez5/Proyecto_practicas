<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados</title>
    <link rel="stylesheet" href="stylesResultados.css">
    <link rel="alternate" href="datos.html">
    <link rel="alternate" href="administracion.html">
</head>

<body>
    <header>
        <h1 class="titulo">Proyecto</h1>
        <div class="navBtn">
            <button id="cambPagAdm" onclick="irAAdministracion()">Ir a Administracion</button>
            <button id="cambPagDat" onclick="irADatos()">Nueva tabla</button>
        </div>
    </header>
    <main>
        <h2>Resultados</h2>
        <div class="cabeceraSabana">
            <p id="nombreSabana"></p>
            <p id="comentarioSabana"></p>
        </div>
        <div style="overflow-x: auto; width: 100%;"></div>
        <table>
            <thead>
                <tr>
                    <th>Referencia</th>
                    <th>Implantacion</th>
                    <th>Formacion</th>
                    <th>Gestion</th>
                    <th>Infraestructura</th>
                    <th>Soporte</th>
                    <th>soporte avanzado</th>
                    <th>Evolucion y mejora</th>
                    <th>Desarrollo</th>
                    <th>Comodin 1</th>
                    <th>Comodin 2</th>
                    <th>Comodin 3</th>
                    <th>Comodin 4</th>
                    <th>
                        <button id="cambPagDatEd" onclick="irADatos()">E</button>
                    </th>
                </tr>
            </thead>
            <tbody id="tablaResultados"></tbody>
        </table>
        </div>
        <p></p>
        <button id="guardarTab" value="GuardarTabla" onclick="guardarTabla()">Guardar</button>
    </main>

    <script>

        function irAAdministracion() {
            window.location.href = "administracion.html";
        }

        function irADatos() {
            // Guardamos las filas actuales en filasGuardadas
            let tiposActuales = JSON.parse(sessionStorage.getItem("tipos")) || [];
            let topesActuales = JSON.parse(sessionStorage.getItem("topes")) || [];
            let serviciosActuales = JSON.parse(sessionStorage.getItem("servicios")) || [];

            let filasGuardadas = JSON.parse(sessionStorage.getItem("filasGuardadas")) || [];
            filasGuardadas.push({ tipos: tiposActuales, topes: topesActuales, servicios: serviciosActuales });
            sessionStorage.setItem("filasGuardadas", JSON.stringify(filasGuardadas));

            // Limpiamos los datos actuales para que datos.html empiece limpio
            sessionStorage.removeItem("tipos");
            sessionStorage.removeItem("topes");
            sessionStorage.removeItem("servicios");
            sessionStorage.removeItem("idSabana");

            window.location.href = "datos.html";
        }

        // ── FUNCIONES AUXILIARES ─────────────────────────────
        function getCantTipos(num, tipos) {
            let encontrado = tipos.find(function (t) { return t.selcTipo == num; });
            return encontrado ? encontrado.cantTipos : "";
        }

        function getCantTopes(num, topes) {
            let encontrado = topes.find(function (t) { return t.selcTope == num; });
            return encontrado ? encontrado.cantTopes : "";
        }

        // ── PINTAR TABLA ─────────────────────────────────────
        function cargarTabla() {
            let tipos = JSON.parse(sessionStorage.getItem("tipos")) || [];
            let topes = JSON.parse(sessionStorage.getItem("topes")) || [];
            let servicios = JSON.parse(sessionStorage.getItem("servicios")) || [];
            let filasGuardadas = JSON.parse(sessionStorage.getItem("filasGuardadas")) || [];

            let tabla = document.getElementById("tablaResultados");
            tabla.innerHTML = "";

            // Pintar filas anteriores guardadas
            filasGuardadas.forEach(function (fila) {
                fila.servicios.forEach(function (serv) {
                    pintarFila(tabla, serv, fila.tipos, fila.topes);
                });
            });

            // Pintar filas nuevas
            if (servicios.length > 0) {
                servicios.forEach(function (serv) {
                    pintarFila(tabla, serv, tipos, topes);
                });
            }

            // Ocultar comodines vacíos
            [9, 10, 11, 12].forEach(function (num) {
                let tieneTipo = tipos.find(function (t) { return t.selcTipo == num; });
                let tieneTope = topes.find(function (t) { return t.selcTope == num; });
                if (!tieneTipo && !tieneTope) {
                    let ths = document.querySelectorAll("thead tr th");
                    if (ths[num]) ths[num].style.display = "none";
                    let tds = document.querySelectorAll("tbody tr td:nth-child(" + (num + 1) + ")");
                    tds.forEach(function (td) { td.style.display = "none"; });
                }
            });
        }

        function pintarFila(tabla, serv, tipos, topes) {
            let fila = document.createElement("tr");
            fila.innerHTML =
                "<td>" + serv.refServicios + "</td>" +
                "<td>" + juntarValores(getCantTipos(1, tipos), getCantTopes(1, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(2, tipos), getCantTopes(2, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(3, tipos), getCantTopes(3, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(4, tipos), getCantTopes(4, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(5, tipos), getCantTopes(5, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(6, tipos), getCantTopes(6, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(7, tipos), getCantTopes(7, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(8, tipos), getCantTopes(8, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(9, tipos), getCantTopes(9, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(10, tipos), getCantTopes(10, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(11, tipos), getCantTopes(11, topes)) + "</td>" +
                "<td>" + juntarValores(getCantTipos(12, tipos), getCantTopes(12, topes)) + "</td>";
            tabla.appendChild(fila);
        }

        // Nueva función que junta tipo y tope en una celda
        function juntarValores(tipo, tope) {
            if (tipo && tope) return tipo + " / " + tope;
            if (tipo) return tipo;
            if (tope) return tope;
            return "";
        }

        // ── AL CARGAR LA PÁGINA ──────────────────────────────
        document.addEventListener("DOMContentLoaded", function () {
            console.log("tipos al cargar:", sessionStorage.getItem("tipos"));
            console.log("topes al cargar:", sessionStorage.getItem("topes"));
            console.log("servicios al cargar:", sessionStorage.getItem("servicios"));
            let idSabana = sessionStorage.getItem("idSabana");

            // Si venimos de administracion cargamos de la BD
            if (idSabana) {
                fetch("http://localhost:8080/maestra/" + idSabana)
                    .then(function (response) { return response.json(); })
                    .then(function (sabana) {
                        document.getElementById("nombreSabana").textContent = sabana.nombre;
                        document.getElementById("comentarioSabana").textContent = sabana.comentario;
                    });

                fetch("http://localhost:8080/margenes")
                    .then(function (response) { return response.json(); })
                    .then(function (margenes) {
                        let tipos = margenes
                            .filter(function (m) { return m.idSabana == idSabana; })
                            .map(function (m) { return { selcTipo: m.idTipoMargen, cantTipos: m.margen }; });
                        sessionStorage.setItem("tipos", JSON.stringify(tipos));
                        cargarTabla();
                    });

                fetch("http://localhost:8080/topes")
                    .then(function (response) { return response.json(); })
                    .then(function (topes) {
                        let topesF = topes
                            .filter(function (t) { return t.idSabana == idSabana; })
                            .map(function (t) { return { selcTope: t.idTipoTopes, cantTopes: t.topes }; });
                        sessionStorage.setItem("topes", JSON.stringify(topesF));
                        cargarTabla();
                    });

                fetch("http://localhost:8080/servicios")
                    .then(function (response) { return response.json(); })
                    .then(function (servicios) {
                        let serviciosF = servicios
                            .filter(function (s) { return s.idSabana == idSabana; })
                            .map(function (s) { return { selcServ: s.idServicios, textoServ: s.concepto, refServicios: s.idServicios }; });
                        sessionStorage.setItem("servicios", JSON.stringify(serviciosF));
                        cargarTabla();
                    });

            } else {
                // Si venimos de datos cargamos del sessionStorage
                let nombreSabana = sessionStorage.getItem("nombreSabana");
                let comentarioSabana = sessionStorage.getItem("comentarioSabana");
                document.getElementById("nombreSabana").textContent = nombreSabana;
                document.getElementById("comentarioSabana").textContent = comentarioSabana;
                cargarTabla();
            }
        });

        // ── GUARDAR EN LA BD ─────────────────────────────────
        function guardarTabla() {
            let filasGuardadas = JSON.parse(sessionStorage.getItem("filasGuardadas")) || [];
            let tiposActuales = JSON.parse(sessionStorage.getItem("tipos")) || [];
            let topesActuales = JSON.parse(sessionStorage.getItem("topes")) || [];
            let serviciosActuales = JSON.parse(sessionStorage.getItem("servicios")) || [];

            // Juntamos todas las filas
            if (serviciosActuales.length > 0) {
                filasGuardadas.push({ tipos: tiposActuales, topes: topesActuales, servicios: serviciosActuales });
            }

            let nombreSabana = sessionStorage.getItem("nombreSabana");
            let comentarioSabana = sessionStorage.getItem("comentarioSabana");
            let tipos = JSON.parse(sessionStorage.getItem("tipos")) || [];
            let topes = JSON.parse(sessionStorage.getItem("topes")) || [];
            let servicios = JSON.parse(sessionStorage.getItem("servicios")) || [];

            let sabana = {
                nombre: nombreSabana,
                comentario: comentarioSabana,
                fecha: new Date().toISOString().split("T")[0]
            };

            fetch("http://localhost:8080/maestra", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(sabana)
            })
                .then(function (response) { return response.json(); })
                .then(function (idSabana) {
                    console.log("Sábana guardada con id: " + idSabana);

                    servicios.forEach(function (serv) {
                        let servicio = {
                            idSabana: idSabana,
                            concepto: serv.textoServ,
                            horas: null, costesH: null, mult: null,
                            coste: null, topeLicitacion: null,
                            margen: null, des: null, pvp: null
                        };

                        fetch("http://localhost:8080/servicios", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(servicio)
                        })
                            .then(function (response) { return response.json(); })
                            .then(function (idServicio) {
                                console.log("Servicio guardado con id: " + idServicio);

                                tipos.forEach(function (tipo) {
                                    fetch("http://localhost:8080/margenes", {
                                        method: "POST",
                                        headers: { "Content-Type": "application/json" },
                                        body: JSON.stringify({
                                            idSabana: idSabana,
                                            idTipoMargen: tipo.selcTipo,
                                            margen: tipo.cantTipos
                                        })
                                    }).then(function () { console.log("Tipo guardado"); });
                                });

                                topes.forEach(function (tope) {
                                    fetch("http://localhost:8080/topes", {
                                        method: "POST",
                                        headers: { "Content-Type": "application/json" },
                                        body: JSON.stringify({
                                            idSabana: idSabana,
                                            idTipoTopes: tope.selcTope,
                                            topes: tope.cantTopes
                                        })
                                    }).then(function () { console.log("Tope guardado"); });
                                });
                            });
                    });

                    // Limpiar sessionStorage para la próxima sábana
                    sessionStorage.removeItem("idSabana");
                    alert("Todo guardado correctamente");
                })
                .catch(function (error) {
                    console.log("Error: " + error);
                    alert("Error al guardar");
                });
        }

    </script>
</body>

</html>
