<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados</title>
    <link rel="stylesheet" href="stylesResultados.css">
    <link rel="alternate" href="datos.html">
    <link rel="alternate" href="administracion.html">
</head>

<body>
    <header>
        <h1 class="titulo">Proyecto</h1>
        <div class="navBtn">
            <button id="cambPagAdm" onclick="irAAdministracion()">Ir a Administracion</button>
            <button id="cambPagDat" onclick="irADatos()">Ir a datos</button>
        </div>
    </header>
    <main>
        <h2>Resultados</h2>
        <div class="cabeceraSabana">
            <p id="nombreSabana"></p>
            <p id="comentarioSabana"></p>
        </div>
        <div style="overflow-x: auto; width: 100%;"></div>
        <table>
            <thead>
                <tr>
                    <th>Referencia</th>
                    <th>Implantacion</th>
                    <th>Formacion</th>
                    <th>Gestion</th>
                    <th>Infraestructura</th>
                    <th>Soporte</th>
                    <th>soporte avanzado</th>
                    <th>Evolucion y mejora</th>
                    <th>Desarrollo</th>
                    <th>Comodin 1</th>
                    <th>Comodin 2</th>
                    <th>Comodin 3</th>
                    <th>Comodin 4</th>
                    <th>
                        <button id="cambPagDatEd" onclick="irADatos()">E</button>
                    </th>
                </tr>
            </thead>
            <tbody id="tablaResultados"></tbody>
        </table>
        </div>
        <p></p>
        <button id="guardarTab" value="GuardarTabla" onclick="guardarTabla()">Guardar</button>
    </main>

    <script>

        function irAAdministracion() {
            window.location.href = "administracion.html";
        }

        function irADatos() {
            sessionStorage.removeItem("idSabana");
            window.location.href = "datos.html";
        }

        // ── FUNCIONES AUXILIARES ─────────────────────────────
        function getCantTipos(num, tipos) {
            let encontrado = tipos.find(function (t) { return t.selcTipo == num; });
            return encontrado ? encontrado.cantTipos : "";
        }

        function getCantTopes(num, topes) {
            let encontrado = topes.find(function (t) { return t.selcTope == num; });
            return encontrado ? encontrado.cantTopes : "";
        }

        // ── PINTAR TABLA ─────────────────────────────────────
        function cargarTabla() {
            let tipos = JSON.parse(sessionStorage.getItem("tipos")) || [];
            let topes = JSON.parse(sessionStorage.getItem("topes")) || [];
            let servicios = JSON.parse(sessionStorage.getItem("servicios")) || [];

            if (servicios.length == 0) return;

            let tabla = document.getElementById("tablaResultados");
            tabla.innerHTML = ""; // limpiar antes de pintar

            servicios.forEach(function (serv) {
                // Fila de tipos
                let filaTipos = document.createElement("tr");
                filaTipos.innerHTML =
                    "<td>" + serv.refServicios + "</td>" +
                    "<td>" + getCantTipos(1, tipos) + "</td>" +
                    "<td>" + getCantTipos(2, tipos) + "</td>" +
                    "<td>" + getCantTipos(3, tipos) + "</td>" +
                    "<td>" + getCantTipos(4, tipos) + "</td>" +
                    "<td>" + getCantTipos(5, tipos) + "</td>" +
                    "<td>" + getCantTipos(6, tipos) + "</td>" +
                    "<td>" + getCantTipos(7, tipos) + "</td>" +
                    "<td>" + getCantTipos(8, tipos) + "</td>" +
                    "<td>" + getCantTipos(9, tipos) + "</td>" +
                    "<td>" + getCantTipos(10, tipos) + "</td>" +
                    "<td>" + getCantTipos(11, tipos) + "</td>" +
                    "<td>" + getCantTipos(12, tipos) + "</td>";
                tabla.appendChild(filaTipos);

                // Fila de topes
                let filaTopes = document.createElement("tr");
                filaTopes.innerHTML =
                    "<td>" + serv.refServicios + "</td>" +
                    "<td>" + getCantTopes(1, topes) + "</td>" +
                    "<td>" + getCantTopes(2, topes) + "</td>" +
                    "<td>" + getCantTopes(3, topes) + "</td>" +
                    "<td>" + getCantTopes(4, topes) + "</td>" +
                    "<td>" + getCantTopes(5, topes) + "</td>" +
                    "<td>" + getCantTopes(6, topes) + "</td>" +
                    "<td>" + getCantTopes(7, topes) + "</td>" +
                    "<td>" + getCantTopes(8, topes) + "</td>" +
                    "<td>" + getCantTopes(9, topes) + "</td>" +
                    "<td>" + getCantTopes(10, topes) + "</td>" +
                    "<td>" + getCantTopes(11, topes) + "</td>" +
                    "<td>" + getCantTopes(12, topes) + "</td>";
                tabla.appendChild(filaTopes);
                // Ocultar columnas de comodín si están vacías
                [9, 10, 11, 12].forEach(function (num) {
                    // Buscamos si hay algún valor en tipos o topes para ese comodín
                    var tieneTipo = tipos.find(function (t) { return t.selcTipo == num; });
                    var tieneTope = topes.find(function (t) { return t.selcTope == num; });

                    // El índice de la columna en la tabla (comodin1=9, comodin2=10...)
                    var colIndex = num; // columna 9 = comodin1, etc.

                    if (!tieneTipo && !tieneTope) {
                        // Ocultar la cabecera
                        var ths = document.querySelectorAll("thead tr th");
                        if (ths[colIndex]) ths[colIndex].style.display = "none";

                        // Ocultar las celdas de esa columna en cada fila
                        var tds = document.querySelectorAll("tbody tr td:nth-child(" + (colIndex + 1) + ")");
                        tds.forEach(function (td) { td.style.display = "none"; });
                    }
                });
            });
        }

        // ── AL CARGAR LA PÁGINA ──────────────────────────────
        document.addEventListener("DOMContentLoaded", function () {
            let idSabana = sessionStorage.getItem("idSabana");

            // Si venimos de administracion cargamos de la BD
            if (idSabana) {
                fetch("http://localhost:8080/maestra/" + idSabana)
                    .then(function (response) { return response.json(); })
                    .then(function (sabana) {
                        document.getElementById("nombreSabana").textContent = sabana.nombre;
                        document.getElementById("comentarioSabana").textContent = sabana.comentario;
                    });

                fetch("http://localhost:8080/margenes")
                    .then(function (response) { return response.json(); })
                    .then(function (margenes) {
                        let tipos = margenes
                            .filter(function (m) { return m.idSabana == idSabana; })
                            .map(function (m) { return { selcTipo: m.idTipoMargen, cantTipos: m.margen }; });
                        sessionStorage.setItem("tipos", JSON.stringify(tipos));
                        cargarTabla();
                    });

                fetch("http://localhost:8080/topes")
                    .then(function (response) { return response.json(); })
                    .then(function (topes) {
                        let topesF = topes
                            .filter(function (t) { return t.idSabana == idSabana; })
                            .map(function (t) { return { selcTope: t.idTipoTopes, cantTopes: t.topes }; });
                        sessionStorage.setItem("topes", JSON.stringify(topesF));
                        cargarTabla();
                    });

                fetch("http://localhost:8080/servicios")
                    .then(function (response) { return response.json(); })
                    .then(function (servicios) {
                        let serviciosF = servicios
                            .filter(function (s) { return s.idSabana == idSabana; })
                            .map(function (s) { return { selcServ: s.idServicios, textoServ: s.concepto, refServicios: s.idServicios }; });
                        sessionStorage.setItem("servicios", JSON.stringify(serviciosF));
                        cargarTabla();
                    });

            } else {
                // Si venimos de datos cargamos del sessionStorage
                let nombreSabana = sessionStorage.getItem("nombreSabana");
                let comentarioSabana = sessionStorage.getItem("comentarioSabana");
                document.getElementById("nombreSabana").textContent = nombreSabana;
                document.getElementById("comentarioSabana").textContent = comentarioSabana;
                cargarTabla();
            }
        });

        // ── GUARDAR EN LA BD ─────────────────────────────────
        function guardarTabla() {
            let nombreSabana = sessionStorage.getItem("nombreSabana");
            let comentarioSabana = sessionStorage.getItem("comentarioSabana");
            let tipos = JSON.parse(sessionStorage.getItem("tipos")) || [];
            let topes = JSON.parse(sessionStorage.getItem("topes")) || [];
            let servicios = JSON.parse(sessionStorage.getItem("servicios")) || [];

            let sabana = {
                nombre: nombreSabana,
                comentario: comentarioSabana,
                fecha: new Date().toISOString().split("T")[0]
            };

            fetch("http://localhost:8080/maestra", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(sabana)
            })
                .then(function (response) { return response.json(); })
                .then(function (idSabana) {
                    console.log("Sábana guardada con id: " + idSabana);

                    servicios.forEach(function (serv) {
                        let servicio = {
                            idSabana: idSabana,
                            concepto: serv.textoServ,
                            horas: null, costesH: null, mult: null,
                            coste: null, topeLicitacion: null,
                            margen: null, des: null, pvp: null
                        };

                        fetch("http://localhost:8080/servicios", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(servicio)
                        })
                            .then(function (response) { return response.json(); })
                            .then(function (idServicio) {
                                console.log("Servicio guardado con id: " + idServicio);

                                tipos.forEach(function (tipo) {
                                    fetch("http://localhost:8080/margenes", {
                                        method: "POST",
                                        headers: { "Content-Type": "application/json" },
                                        body: JSON.stringify({
                                            idSabana: idSabana,
                                            idTipoMargen: tipo.selcTipo,
                                            margen: tipo.cantTipos
                                        })
                                    }).then(function () { console.log("Tipo guardado"); });
                                });

                                topes.forEach(function (tope) {
                                    fetch("http://localhost:8080/topes", {
                                        method: "POST",
                                        headers: { "Content-Type": "application/json" },
                                        body: JSON.stringify({
                                            idSabana: idSabana,
                                            idTipoTopes: tope.selcTope,
                                            topes: tope.cantTopes
                                        })
                                    }).then(function () { console.log("Tope guardado"); });
                                });
                            });
                    });

                    // Limpiar sessionStorage para la próxima sábana
                    sessionStorage.removeItem("idSabana");
                    alert("Todo guardado correctamente");
                })
                .catch(function (error) {
                    console.log("Error: " + error);
                    alert("Error al guardar");
                });
        }

    </script>
</body>

</html>
