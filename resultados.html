<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados</title>
    <link rel="stylesheet" href="stylesResultados.css">
    <link rel="alternate" href="datos.html">
    <link rel="alternate" href="administracion.html">
</head>

<body>
    <header>
        <h1 class="titulo">Proyecto</h1>
        <div class="navBtn">
            <button id="cambPagAdm" onclick="irAAdministracion()">Ir a Administracion</button>
            <button id="cambPagDat" onclick="irADatos()">Ir a datos</button>
        </div>
    </header>
    <main>
        <h2>Resultados</h2>
        <div class="cabeceraSabana">
            <p id="nombreSabana"></p>
            <p id="comentarioSabana"></p>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Referencia</th>
                    <th>Implantacion</th>
                    <th>Formacion</th>
                    <th>Gestion</th>
                    <th>Infraestructura</th>
                    <th>Soporte</th>
                    <th>soporte avanzado</th>
                    <th>Evolucion y mejora</th>
                    <th>Desarrollo</th>
                    <!--modificable-->
                    <th>Comodin 1</th>
                    <!--modificable-->
                    <th>Comodin 2</th>
                    <!--modificable-->
                    <th>Comodin 3</th>
                    <!--modificable-->
                    <th>Comodin 4</th>
                    <th>
                        <!--editar datos--> <button id="cambPagDatEd" onclick="irADatos()">E</button>
                        <!--borrar campo--> <button id="borCamp" onclick="BorrarCampo()">D</button>
                    </th>
                </tr>
            </thead>
            <tbody id="tablaResultados"></tbody>
        </table>
        <p></p>
        <button id="guardarTab" value="GuardarTabla" onclick="guardarTabla()">Guardar</button>


        <script>

            let referencia = 0;

            function irAAdministracion() {
                window.location.href = "administracion.html";
            }

            function irADatos() {
                window.location.href = "datos.html";
            }

            document.addEventListener("DOMContentLoaded", function () {

                let nombreSabana = sessionStorage.getItem("nombreSabana");
                let comentarioSabana = sessionStorage.getItem("comentarioSabana");

                document.getElementById("nombreSabana").textContent = nombreSabana;
                document.getElementById("comentarioSabana").textContent = comentarioSabana;

                let tipos = JSON.parse(sessionStorage.getItem("tipos")) || [];
                let topes = JSON.parse(sessionStorage.getItem("topes")) || [];
                let servicios = JSON.parse(sessionStorage.getItem("servicios")) || [];

                console.log("Tipos:", tipos);
                console.log("Topes:", topes);
                console.log("Servicios:", servicios);

                let tabla = document.getElementById("tablaResultados");

                servicios.forEach(function (serv) {
                    let filaTipos = document.createElement("tr");

                    function getCantTipos(num) {
                        let encontrado = tipos.find(function (t) {
                            return t.selcTipo == num;
                        });

                        return encontrado ? encontrado.cantTipos : "";
                    }

                    filaTipos.innerHTML =
                        "<td>" + serv.refServicios + "</td>" +
                        "<td>" + getCantTipos(1) + "</td>" +
                        "<td>" + getCantTipos(2) + "</td>" +
                        "<td>" + getCantTipos(3) + "</td>" +
                        "<td>" + getCantTipos(4) + "</td>" +
                        "<td>" + getCantTipos(5) + "</td>" +
                        "<td>" + getCantTipos(6) + "</td>" +
                        "<td>" + getCantTipos(7) + "</td>" +
                        "<td>" + getCantTipos(8) + "</td>" +
                        "<td>" + getCantTipos(9) + "</td>" +
                        "<td>" + getCantTipos(10) + "</td>" +
                        "<td>" + getCantTipos(11) + "</td>" +
                        "<td>" + getCantTipos(12) + "</td>";
                    tabla.appendChild(filaTipos);

                    let filaTopes = document.createElement("tr");

                    function getCantTopes(num) {
                        let encontrado = topes.find(function (t) {
                            return t.selcTope == num;
                        });

                        return encontrado ? encontrado.cantTopes : "";
                    }

                    filaTopes.innerHTML =
                        "<td>" + serv.refServicios + "</td>" +
                        "<td>" + getCantTopes(1) + "</td>" +
                        "<td>" + getCantTopes(2) + "</td>" +
                        "<td>" + getCantTopes(3) + "</td>" +
                        "<td>" + getCantTopes(4) + "</td>" +
                        "<td>" + getCantTopes(5) + "</td>" +
                        "<td>" + getCantTopes(6) + "</td>" +
                        "<td>" + getCantTopes(7) + "</td>" +
                        "<td>" + getCantTopes(8) + "</td>" +
                        "<td>" + getCantTopes(9) + "</td>" +
                        "<td>" + getCantTopes(10) + "</td>" +
                        "<td>" + getCantTopes(11) + "</td>" +
                        "<td>" + getCantTopes(12) + "</td>";
                    tabla.appendChild(filaTopes);
                });
            });

            function guardarTabla() {
                let nombreSabana = sessionStorage.getItem("nombreSabana");
                let comentarioSabana = sessionStorage.getItem("comentarioSabana");
                let tipos = JSON.parse(sessionStorage.getItem("tipos")) || [];
                let topes = JSON.parse(sessionStorage.getItem("topes")) || [];
                let servicios = JSON.parse(sessionStorage.getItem("servicios")) || [];

                let sabana = {
                    nombre: nombreSabana,
                    comentario: comentarioSabana,
                    fecha: new Date().toISOString().split("T")[0]
                };

                // Paso 1 — Guardar la sábana y obtener su id
                fetch("http://localhost:8080/maestra", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(sabana)
                })
                    .then(function (response) { return response.json(); })
                    .then(function (idSabana) {
                        console.log("Sábana guardada con id: " + idSabana);

                        // Paso 2 — Guardar cada servicio
                        servicios.forEach(function (serv) {
                            let servicio = {
                                idSabana: idSabana,
                                concepto: serv.textoServ,
                                horas: null,
                                costesH: null,
                                mult: null,
                                coste: null,
                                topeLicitacion: null,
                                margen: null,
                                des: null,
                                pvp: null
                            };

                            fetch("http://localhost:8080/servicios", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(servicio)
                            })
                                .then(function (response) { return response.json(); })
                                .then(function (idServicio) {
                                    console.log("Servicio guardado con id: " + idServicio);

                                    // Paso 3 — Guardar los tipos asociados al servicio
                                    tipos.forEach(function (tipo) {
                                        let margen = {
                                            idSabana: idSabana,
                                            idTipoMargen: tipo.selcTipo,
                                            margen: tipo.cantTipos
                                        };
                                        fetch("http://localhost:8080/margenes", {
                                            method: "POST",
                                            headers: { "Content-Type": "application/json" },
                                            body: JSON.stringify(margen)
                                        })
                                            .then(function () { console.log("Tipo guardado"); });
                                    });

                                    // Paso 4 — Guardar los topes asociados al servicio
                                    topes.forEach(function (tope) {
                                        let topeObj = {
                                            idSabana: idSabana,
                                            idTipoTopes: tope.selcTope,
                                            topes: tope.cantTopes
                                        };
                                        fetch("http://localhost:8080/topes", {
                                            method: "POST",
                                            headers: { "Content-Type": "application/json" },
                                            body: JSON.stringify(topeObj)
                                        })
                                            .then(function () { console.log("Tope guardado"); });
                                    });
                                });
                        });

                        alert("Todo guardado correctamente");
                    })
                    .catch(function (error) {
                        console.log("Error: " + error);
                        alert("Error al guardar");
                    });
            }
</script>
</body>

</html>
