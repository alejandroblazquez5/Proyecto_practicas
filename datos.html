<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos</title>
    <link rel="stylesheet" href="stylesDatos.css">
    <link rel="alternate" href="administracion.html">
    <link rel="alternate" href="resultados.html">
</head>

<body>
    <header>
        <h1 class="titulo">Proyecto</h1>
        <div class="navBtn">
            <button id="cambPagAdm" onclick="irAAdministracion()">Ir a Administracion</button>
            <button id="cambPagRes" onclick="irAResultados()">Ir a resultados</button>
        </div>
    </header>
    <main>
        <h2>Datos</h2>
        <div>
            <input type="text" id="nombreSabana" placeholder="Introduzca el nombre de la sabana">
            <input type="text" id="comentarioSabana" placeholder="Introduzca un comentario sobre la sabana">
        </div>
        <div class="tiptopserv">
            <div class="Tipos">
                <fieldset class="recTip">
                    <div class="cabtip">
                        <h2>Tipos</h2>
                        <button id="añadirTip" value="+" onclick="añadirTipo()">+</button>
                    </div>
                    <div class="datosTipos">
                        <select class="selcTipo">
                            <option value="0" selected disabled>Selecciona un tipo</option>
                            <option value="1" class="impTip">Implantacion</option>
                            <option value="2" class="forTip">Formacion</option>
                            <option value="3" class="gesTip">Gestion</option>
                            <option value="4" class="infTip">Infraestructura</option>
                            <option value="5" class="sopTip">Soporte</option>
                            <option value="6" class="sopAvTip">soporte avanzado</option>
                            <option value="7" class="evoMejTip">Evolucion y mejora</option>
                            <option value="8" class="desTip">Desarrollo</option>
                            <!--modificable-->
                            <option value="9" class="comodin1Tip">Comodin 1</option>
                            <!--modificable-->
                            <option value="10" class="comodin2Tip">Comodin 2</option>
                            <!--modificable-->
                            <option value="11" class="comodin3Tip">Comodin 3</option>
                            <!--modificable-->
                            <option value="12" class="comodin4Tip">Comodin 4</option>
                        </select>
                        <input type="number" class="cantTipos" placeholder="Introduzca la cantidad">
                    </div>
                    <button id="enviarTip" value="EnviarTipos" onclick="enviarTipo()">Enviar</button>
                </fieldset>
            </div>
            <p></p>
            <div class="Topes">
                <fieldset class="recTop">
                    <div class="cabtop">
                        <h2>Agrupacion de topes</h2>
                        <button id="añadirTop" value="+" onclick="añadirTope()">+</button>
                    </div>
                    <div class="datosTopes">
                        <select class="selcTope">
                            <option value="0" selected disabled>Selecciona un tope</option>
                            <option value="1" class="impTop">Implantacion</option>
                            <option value="2" class="forTop">Formacion</option>
                            <option value="3" class="gesTop">Gestion</option>
                            <option value="4" class="infTop">Infraestructura</option>
                            <option value="5" class="sopTop">Soporte</option>
                            <option value="6" class="sopAvTop">soporte avanzado</option>
                            <option value="7" class="evoMejTop">Evolucion y mejora</option>
                            <option value="8" class="desTop">Desarrollo</option>
                            <!--modificable-->
                            <option value="9" class="comodin1Top">Comodin 1</option>
                            <!--modificable-->
                            <option value="10" class="comodin2Top">Comodin 2</option>
                            <!--modificable-->
                            <option value="11" class="comodin3Top">Comodin 3</option>
                            <!--modificable-->
                            <option value="12" class="comodin4Top">Comodin 4</option>
                        </select>
                        <input type="number" class="cantTopes" placeholder="Introduzca la cantidad">
                    </div>
                    <button id="enviarTop" value="EnviarTopes" onclick="enviarTope()">Enviar</button>
                </fieldset>
            </div>
            <p></p>
            <div class="Servicios">
                <fieldset class="recServ">
                    <div class="cabserv">
                        <h2>Servicios</h2>
                    </div>
                    <div class="datosServicios">
                        <select class="selcServ">
                            <option value="0" selected disabled>Selecciona un servicio</option>
                            <option value="1" class="Serv">Servicio de mantenimiento de desarrollo</option>
                            <option value="2" class="ServPremium">Servicio de mantenimiento de desarrollo premium</option>
                        </select>
                        <input type="number" class="refServicios" placeholder="Introduzca la referencia">
                    </div>
                    <button id="enviarServ" value="EnviarServicios" onclick="enviarServicio()">Enviar</button>
                </fieldset>
            </div>
        </div>
    </main>
</body>
<script>

    let selcTipo = 0;
    let selcTope = 0;
    let selcServ = 0;
    let cantTipos = 0;
    let cantTopes = 0;
    let cantServicios = 0;
    let nombreSabana = "";
    let comentarioSabana = "";


    function irAAdministracion() {
        window.location.href = "administracion.html";
    }

    function irAResultados() {
        guardarCabecera();
        window.location.href = "resultados.html";
    }

    function guardarCabecera() {
        nombreSabana = document.getElementById("nombreSabana").value;
        comentarioSabana = document.getElementById("comentarioSabana").value;

        sessionStorage.setItem("nombreSabana", nombreSabana);
        sessionStorage.setItem("comentarioSabana", comentarioSabana);

        console.log("Guardado en sessionStorage: " + sessionStorage.getItem("nombreSabana"));
    }

    function añadirTipo() {
        const datosTipos = document.querySelector('.datosTipos');
        const clone = datosTipos.cloneNode(true);
        datosTipos.parentNode.insertBefore(clone, datosTipos.nextSibling);
    }

    function añadirTope() {
        const datosTopes = document.querySelector('.datosTopes');
        const clone = datosTopes.cloneNode(true);
        datosTopes.parentNode.insertBefore(clone, datosTopes.nextSibling);
    }

    function enviarTipo() {
        let selects = document.querySelectorAll(".selcTipo");
        let inputs = document.querySelectorAll(".cantTipos");
        let tipos = [];

        selects.forEach(function (select, i) {
            let selcTipo = select.value;
            let textoTipo = select.options[select.selectedIndex].text;
            let cantTipos = inputs[i].value;

            if (selcTipo != 0) {
                tipos.push({ selcTipo: selcTipo, textoTipo: textoTipo, cantTipos: cantTipos });
            }
        });

        sessionStorage.setItem("tipos", JSON.stringify(tipos));
        console.log("Tipos guardados: ", tipos);
    }

    function enviarTope() {
        let selects = document.querySelectorAll(".selcTope");
        let inputs = document.querySelectorAll(".cantTopes");
        let topes = [];

        selects.forEach(function (select, i) {
            let selcTope = select.value;
            let textoTope = select.options[select.selectedIndex].text;
            let cantTopes = inputs[i].value;

            if (selcTope != 0) {
                topes.push({ selcTope: selcTope, textoTope: textoTope, cantTopes: cantTopes });
            }
        });

        sessionStorage.setItem("topes", JSON.stringify(topes));
        console.log("Topes guardados: ", topes);
    }

    function enviarServicio() {
        let selects = document.querySelectorAll(".selcServ");
        let inputs = document.querySelectorAll(".refServicios");
        let servicios = [];

        selects.forEach(function (select, i) {
            let selcServ = select.value;
            let textoServ = select.options[select.selectedIndex].text;
            let refServicios = inputs[i].value;

            if (selcServ != 0) {
                servicios.push({ selcServ: selcServ, textoServ: textoServ, refServicios: refServicios });
            }
        });

        sessionStorage.setItem("servicios", JSON.stringify(servicios));
        console.log("Servicios guardados: ", servicios);
    }

</script>

</html>
