<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos</title>
    <link rel="stylesheet" href="stylesDatos.css">
    <link rel="alternate" href="administracion.html">
    <link rel="alternate" href="resultados.html">
</head>

<body>
    <header>
        <h1 class="titulo">Proyecto</h1>
        <div class="navBtn">
            <button id="cambPagAdm" onclick="irAAdministracion()">Ir a Administracion</button>
            <button id="cambPagRes" onclick="irAResultados()">Ir a resultados</button>
        </div>
    </header>
    <main>
        <h2>Datos</h2>
        <div class="tiptopserv">
            <div class="Tipos">
                <fieldset class="recTip">
                    <div class="cabtip">
                        <h2>Tipos</h2>
                        <button id="añadirTip" value="+" onclick="añadirTipo()">+</button>
                    </div>
                    <div class="datosTipos">
                        <select id="selcTipo">
                            <option value="0" selected disabled>Selecciona un tipo</option>
                            <option value="1" id="impTip">Implantacion</option>
                            <option value="2" id="forTip">Formacion</option>
                            <option value="3" id="gesTip">Gestion</option>
                            <option value="4" id="infTip">Infraestructura</option>
                            <option value="5" id="sopTip">Soporte</option>
                            <option value="6" id="sopAvTip">soporte avanzado</option>
                            <option value="7" id="evoMejTip">Evolucion y mejora</option>
                            <option value="8" id="desTip">Desarrollo</option>
    <!--modificable-->      <option value="9" id="comodin1Tip">Comodin 1</option>
    <!--modificable-->      <option value="10" id="comodin2Tip">Comodin 2</option>
    <!--modificable-->      <option value="11" id="comodin3Tip">Comodin 3</option>
    <!--modificable-->      <option value="12" id="comodin4Tip">Comodin 4</option>
                        </select>
                        <input type="number" id="cantTipos" placeholder="Introduzca la cantidad">
                    </div>
                    <button id="enviarTip" value="EnviarTipos" onclick="enviarTipo()">Enviar</button>
                </fieldset>
            </div>
            <p></p>
            <div class="Topes">
                <fieldset class="recTop">
                    <div class="cabtop">
                        <h2>Agrupacion de topes</h2>
                        <button id="añadirTop" value="+" onclick="añadirTope()">+</button>
                    </div>
                    <div class="datosTopes">
                        <select id="selcTope">
                            <option value="0" selected disabled>Selecciona un tope</option>
                            <option value="1" id="impTop">Implantacion</option>
                            <option value="2" id="forTop">Formacion</option>
                            <option value="3" id="gesTop">Gestion</option>
                            <option value="4" id="infTop">Infraestructura</option>
                            <option value="5" id="sopTop">Soporte</option>
                            <option value="6" id="sopAvTop">soporte avanzado</option>
                            <option value="7" id="evoMejTop">Evolucion y mejora</option>
                            <option value="8" id="desTop">Desarrollo</option>
    <!--modificable-->      <option value="9" id="comodin1Top">Comodin 1</option>
    <!--modificable-->      <option value="10" id="comodin2Top">Comodin 2</option>
    <!--modificable-->      <option value="11" id="comodin3Top">Comodin 3</option>
    <!--modificable-->      <option value="12" id="comodin4Top">Comodin 4</option>
                        </select>
                        <input type="number" id="cantTopes" placeholder="Introduzca la cantidad">
                    </div>
                    <button id="enviarTop" value="EnviarTopes" onclick="enviarTope()">Enviar</button>
                </fieldset>
            </div>
            <p></p>
            <div class="Servicios">
                <fieldset class="recServ">
                    <div class="cabserv">
                        <h2>Servicios</h2>
                        <button id="añadirServ" value="+" onclick="añadirServ()">+</button>
                    </div>
                    <div class="datosServicios">
                        <select id="selcServ">
                            <option value="0" selected disabled>Selecciona un servicio</option>
                            <option value="1" id="Serv">Servicio de mantenimiento de desarrollo</option>
                            <option value="2" id="ServPremium">Servicio de mantenimiento de desarrollo premium</option>
                        </select>
                        <input type="text" id="cantServicios" placeholder="Introduzca la referencia">
                    </div>
                    <button id="enviarServ" value="EnviarServicios" onclick="enviarServicio()">Enviar</button>
                </fieldset>
            </div>
        </div>
    </main>
</body>
<script>

    var selcTipo = 0;
    var selcTope = 0;
    var selcServ = 0;
    var cantTipos = 0;
    var cantTopes = 0;
    var cantServicios = 0;

    function irAAdministracion() {
        window.location.href = "administracion.html";
    }

    function irAResultados() {
        window.location.href = "resultados.html";
    }

    function añadirTipo() {
        const datosTipos = document.querySelector('.datosTipos');
        const clone = datosTipos.cloneNode(true);
        datosTipos.parentNode.insertBefore(clone, datosTipos.nextSibling);
    }

    function añadirTope() {
        const datosTopes = document.querySelector('.datosTopes');
        const clone = datosTopes.cloneNode(true);
        datosTopes.parentNode.insertBefore(clone, datosTopes.nextSibling);
    }

    function añadirServ() {
        const datosServicios = document.querySelector('.datosServicios');
        const clone = datosServicios.cloneNode(true);
        datosServicios.parentNode.insertBefore(clone, datosServicios.nextSibling);
    }

    function enviarTipo() {
        selcTipo = document.getElementById("selcTipo").value;
        cantTipos = document.getElementById("cantTipos").value;
        console.log("Tipo seleccionado: " + selcTipo + ", Cantidad: " + cantTipos);
    }

    function enviarTope() {
        selcTope = document.getElementById("selcTope").value;
        cantTopes = document.getElementById("cantTopes").value;
        console.log("Tope seleccionado: " + selcTope + ", Cantidad: " + cantTopes);
    }

    function enviarServicio() {
        selcServ = document.getElementById("selcServ").value;
        cantServicios = document.getElementById("cantServicios").value;
        console.log("Servicio seleccionado: " + selcServ + ", Cantidad: " + cantServicios);
    }

</script>

</html>
