<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administracion</title>
    <link rel="stylesheet" href="stylesAdministracion.css">
    <link rel="alternate" href="datos.html">
    <link rel="alternate" href="resultados.html">
</head>

<body>
    <header>
        <h1 class="titulo">Proyecto</h1>
        <div class="navBtn">
            <button id="cambPagIni" onclick="irADatos()">Ir a datos</button>
            <button id="cambPagRes" onclick="irAResultados()">Ir a resultados</button>
        </div>
    </header>
    <main>
        <h2>Administracion</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Ver sabana</th>
                    <th>Borrar sabana</th>
                </tr>
            </thead>
            <tbody id="tablaResultados"></tbody>
        </table>
    </main>
    <script>

        function irADatos() {
            sessionStorage.removeItem("idSabana");
            window.location.href = "datos.html";
        }

        function irAResultados() {
            window.location.href = "resultados.html";
        }

        function borrarSabana(id) {
            if (!confirm("¿Seguro que quieres borrar esta sábana?")) return;

            fetch("http://localhost:8080/margenes/sabana/" + id, { method: "DELETE" })
                .then(function () {
                    return fetch("http://localhost:8080/topes/sabana/" + id, { method: "DELETE" });
                })
                .then(function () {
                    return fetch("http://localhost:8080/servicios/sabana/" + id, { method: "DELETE" });
                })
                .then(function () {
                    return fetch("http://localhost:8080/maestra/" + id, { method: "DELETE" });
                })
                .then(function () {
                    alert("Sábana borrada correctamente");
                    location.reload();
                })
                .catch(function (error) {
                    console.log("Error: " + error);
                    alert("Error al borrar");
                });
        }
        
        // Al cargar la página cargamos todas las sábanas de la BD
        document.addEventListener("DOMContentLoaded", function () {
            console.log("idSabana en resultados: " + sessionStorage.getItem("idSabana"));
            fetch("http://localhost:8080/maestra")
                .then(function (response) { return response.json(); })
                .then(function (sabanas) {
                    console.log("Sábanas: ", sabanas);
                    let tabla = document.getElementById("tablaResultados");

                    sabanas.forEach(function (sabana) {
                        let fila = document.createElement("tr");
                        fila.innerHTML =
                            "<td>" + sabana.idsabana + "</td>" +
                            "<td>" + sabana.nombre + "</td>" +
                            "<td><button onclick='verSabana(" + sabana.idsabana + ")'>Ver</button></td>" +
                            "<td><button onclick='borrarSabana(" + sabana.idsabana + ")'>Borrar</button></td>";
                        tabla.appendChild(fila);
                    });
                })
                .catch(function (error) {
                    console.log("Error: " + error);
                });
        });

        function verSabana(id) {
            sessionStorage.removeItem("tipos");
            sessionStorage.removeItem("topes");
            sessionStorage.removeItem("servicios");
            sessionStorage.removeItem("nombreSabana");
            sessionStorage.removeItem("comentarioSabana");
            sessionStorage.setItem("idSabana", id);
            console.log("idSabana guardado: " + sessionStorage.getItem("idSabana"));
            window.location.href = "resultados.html";
        }

    </script>
</body>

</html>
